<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roma 2026</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; min-height: 100vh; background: #F7F6F2; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1E1E1E; padding: 12px; display: flex; flex-direction: column; margin: 0; }
        h1 { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
        .sub { font-size: 12px; color: #666; margin-bottom: 12px; }
        hr { border: none; border-top: 1px solid #DEDCD5; margin-bottom: 12px; }

        /* Estilo unificado de tarjetas */
        .card { background: #fff; border: 1px solid #DEDCD5; border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
        .card-header { display: flex; align-items: center; padding: 14px 16px; cursor: pointer; font-size: 16px; }
        .badge { border-radius: 20px; padding: 3px 9px; font-size: 10px; font-weight: 700; margin-right: 12px; white-space: nowrap; }
        .card-title { font-size: 14px; font-weight: 600; color: #1E1E1E; }
        
        /* ESTO PEGA LA FECHA A LA DERECHA */
        .card-date { margin-left: auto; font-size: 12px; color: #888; margin-right: 10px; white-space: nowrap; }
        
        .chevron { font-size: 14px; color: #aaa; transition: transform .2s; }
        .chevron.open { transform: rotate(90deg); }

        .card-body { display: none; padding: 0 14px 16px; }
        .card-body.open { display: block; }
        
        /* Clases de apoyo y colores que ya tenías */
        .sec { font-size: 9px; font-weight: 700; color: #888; text-transform: uppercase; margin: 12px 0 6px; }
        .item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; font-size: 12px; }
        .time { color: #aaa; min-width: 44px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
        .b-llegada { background:#E1F5EE; color:#0F6E56; } .b-napoles { background:#FAEEDA; color:#854F0B; }
        .b-coliseo { background:#EAF3DE; color:#3B6D11; } .b-roma { background:#EEEDFE; color:#3C3489; }
        .b-vaticano { background:#FAECE7; color:#993C1D; } .b-pompeya { background:#FCEBEB; color:#A32D2D; }
        .b-salida { background:#E6F1FB; color:#185FA5; } .b-consejos { background:#FFF3DC; color:#854F0B; }
        .d-blue { background:#378ADD; } .d-gray { background:#888; } .d-amber { background:#BA7517; } 
        .d-purple { background:#7F77DD; } .d-teal { background:#1D9E75; } .d-coral { background:#D85A30; } 
        .d-green { background:#639922; } .d-orange { background:#E07B20; }
        .tag { font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 8px; margin-left: 4px; }
        .t-rest { background:#FFF0D6; color:#854F0B; } .t-des { background:#E1F5EE; color:#0F6E56; }
        .t-comp { background:#F0EFFD; color:#3C3489; } .t-info { background:#E6F1FB; color:#185FA5; }
        .t-food { background:#FCEBEB; color:#A32D2D; }
        .note, .warn, .fixed { font-size: 11px; border-radius: 6px; padding: 8px; margin-top: 10px; line-height: 1.5; }
        .note { background:#F0EFFD; color:#3C3489; } .warn { background:#FFF3DC; color:#854F0B; } .fixed { background:#E8F7E8; color:#2D6A2D; }
        
        .sub-card { border: 1px solid #EBEBEB; border-radius: 8px; margin-top: 8px; }
        .sub-header { display: flex; align-items: center; padding: 8px 10px; cursor: pointer; }
        .sub-title { flex: 1; font-size: 11px; font-weight: 600; color: #444; margin-left: 6px; }
        .sub-body { display: none; padding: 8px 10px; border-top: 1px solid #EBEBEB; }
        .sub-body.open { display: block; }
        .footer { font-size: 10px; color: #aaa; text-align: center; margin-top: auto; padding: 20px 0; }
    </style>
</head>
<body>

<h1>🇮🇹 Roma 2026</h1>
<p class="sub">12 – 19 agosto · 3 personas · Hotel Positano, Via Palestro 49</p>
<hr>

<div class="card">
  <div class="card-header" onclick="tog(this)">
    <span class="badge b-llegada">LLEGADA</span>
    <span class="card-title">Día 1 – Llegada</span>
    <span class="card-date">12 ago · mié</span>
    <span class="chevron">›</span>
  </div>
  <div class="card-body">
    </div>
</div>

<p class="footer">Roma 2026 · Documento provisional</p>

<script>
  function tog(el) {
    el.nextElementSibling.classList.toggle('open');
    el.querySelector('.chevron').classList.toggle('open');
  }
  function subtog(el) {
    el.nextElementSibling.classList.toggle('open');
    el.querySelector('.sub-chevron').classList.toggle('open');
  }
</script>
</body>
</html>
